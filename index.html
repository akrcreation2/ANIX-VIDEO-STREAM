<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}
.container{
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}
input{
    width:100%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:none;
}
button{
    margin-top:10px;
    padding:12px 25px;
    background:#6d28d9;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
video{
    width:100%;
}
    .logo{
    text-align:center;
    font-size:42px;
    font-weight:800;
    font-family:'Poppins',sans-serif;
    letter-spacing:2px;
    margin-bottom:25px;

    background:linear-gradient(90deg,#ff2d55,#8b5cf6,#ff2d55);
    background-size:200% auto;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:shine 4s linear infinite;

    text-shadow:
        0 0 10px rgba(255,45,85,.4),
        0 0 20px rgba(139,92,246,.4);
}

@keyframes shine{
    from{
        background-position:0%;
    }
    to{
        background-position:200%;
    }
}
</style>

</head>
<body>

<div class="container">

<h1 class="logo">
ANiX <b>ViDEO STREAM</b>
</h1>
    
<input
id="url"
placeholder="Paste your MP4 or HLS (.m3u8) URL here">

<button onclick="playVideo()">Play</button>

<video id="player" controls playsinline></video>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>

const player = new Plyr('#player');

const params = new URLSearchParams(window.location.search);
const videoUrl = params.get("video");

if (videoUrl) {
    const video = document.getElementById("player");

    video.src = decodeURIComponent(videoUrl);

    video.load();

    video.play().catch(() => {
        console.log("Autoplay blocked");
    });
}

function playVideo() {
    const url = document.getElementById("url").value;
    const video = document.getElementById("player");

    video.src = url;
    video.load();
    video.play();
}

</script>

</body>
</html>
